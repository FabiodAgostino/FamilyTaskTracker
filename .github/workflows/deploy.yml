name: Deploy Family Task Tracker to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Create .env file
        run: |
          cat > client/.env << EOF
          # Firebase Configuration
          VITE_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.FIREBASE_MEASUREMENT_ID }}

          # Application Environment
          NODE_ENV=production
          VITE_APP_NAME=Family Task Tracker
          VITE_APP_VERSION=1.0.0

          # Google Search API
          VITE_GOOGLE_SEARCH_API_KEY=${{ secrets.GOOGLE_SEARCH_API_KEY }}
          VITE_GOOGLE_SEARCH_ENGINE_ID=${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}
          EOF
          
          echo "✅ File .env creato per il build"
      
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          VITE_GOOGLE_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}
          VITE_APP_NAME: "Family Task Tracker"
          VITE_APP_VERSION: "1.0.0"
          NODE_ENV: production
      
      - name: Copy index.html to 404.html for SPA support
        run: cp docs/index.html docs/404.html
      
      - name: Debug build output
        run: |
          echo "📁 Contenuto della cartella docs:"
          ls -la docs/
          echo "----------------"
          if [ -d "docs/assets" ]; then
            echo "📁 Contenuto di docs/assets:"
            ls -la docs/assets/
          else
            echo "❌ Cartella docs/assets non trovata!"
            mkdir -p docs/assets
            echo "✅ Cartella docs/assets creata"
          fi
      
      - name: Create .nojekyll file
        run: touch docs/.nojekyll
      
      - name: Create 404.html for SPA routing
        run: |
          cat > docs/404.html << 'EOL'
          <!DOCTYPE html>
          <html lang="it">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Reindirizzamento - Family Task Tracker</title>
              <script>
                  // Gestione routing per SPA
                  const path = window.location.pathname;
                  const repoName = '/FamilyTaskTracker/'; // Nome repository corretto
                  
                  if (path.startsWith(repoName)) {
                      const relativePath = path.substring(repoName.length) || '';
                      window.location.replace(repoName + '#/' + relativePath + window.location.search + window.location.hash);
                  } else {
                      window.location.replace(repoName + '#/' + window.location.search + window.location.hash);
                  }
              </script>
              <style>
                  body {
                      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      height: 100vh;
                      margin: 0;
                      background: linear-gradient(135deg, #F4F1DE 0%, #E07A5F 100%);
                  }
                  .container {
                      text-align: center;
                      padding: 2rem;
                      border-radius: 12px;
                      background-color: white;
                      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
                      color: #3D405B;
                  }
                  .spinner {
                      border: 3px solid #f3f3f3;
                      border-top: 3px solid #E07A5F;
                      border-radius: 50%;
                      width: 30px;
                      height: 30px;
                      animation: spin 1s linear infinite;
                      margin: 0 auto 20px;
                  }
                  @keyframes spin {
                      0% { transform: rotate(0deg); }
                      100% { transform: rotate(360deg); }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="spinner"></div>
                  <h1>Reindirizzamento in corso...</h1>
                  <p>Attendere mentre si viene reindirizzati all'applicazione.</p>
              </div>
          </body>
          </html>
          EOL
      
      - name: Verify index.html
        run: |
          echo "🔍 Verifica del file index.html:"
          if [ -f "docs/index.html" ]; then
            echo "✅ index.html trovato"
            head -20 docs/index.html
          else
            echo "❌ index.html non trovato!"
            exit 1
          fi
      
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: false
          clean-exclude: |
            .nojekyll
            404.html
            assets/
      
      - name: Deployment completed
        run: |
          echo "🚀 Deploy completato con successo!"
          echo "🌐 Il tuo sito sarà disponibile a: https://fabiodagostino.github.io/FamilyTaskTracker/"